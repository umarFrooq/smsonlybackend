# Render Blueprint: connect this repo in the Render dashboard, then use "Apply blueprint"
# or create a Web Service manually with the same build/start commands.
# Set all environment variables from config/config.js in the service Environment tab.

services:
  - type: web
    name: bazar247-api
    runtime: node
    plan: starter
    buildCommand: npm install --omit=dev
    startCommand: npm start
    healthCheckPath: /v1/health-check
    envVars:
      - key: NODE_ENV
        value: production
